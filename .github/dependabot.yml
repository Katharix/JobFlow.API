version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "ci"
  - package-ecosystem: nuget
    directory: /JobFlow.API
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 10
