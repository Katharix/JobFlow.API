name: Build and deploy ASP.Net Core app to Azure Web App - jobflow-api

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (format: release-*)"
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  version-overview:
    name: Version Overview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Publish version table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          STAGING_VERSION: ${{ vars.API_STAGING_VERSION }}
          PROD_VERSION: ${{ vars.API_PRODUCTION_VERSION }}
        run: |
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## API Release Versions"
            echo
            echo "Target release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Current deployed version | Planned action |"
            echo "| --- | --- | --- |"
            echo "| Staging | $STAGING_VERSION | Already deployed before tagging |"
            echo "| Production | $PROD_VERSION | Deploy $RELEASE_TAG after approval |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    needs: version-overview
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          fetch-depth: 0

      - name: Validate release tag ref
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF" =~ ^release- ]]; then
            echo "Production deployments require a release-* tag."
            exit 1
          fi

          TAG_SHA="$(git rev-list -n 1 "$RELEASE_REF" 2>/dev/null || true)"
          if [ -z "$TAG_SHA" ]; then
            echo "Unable to resolve tag ref: $RELEASE_REF"
            exit 1
          fi

          git fetch --no-tags origin master:refs/remotes/origin/master

          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "Release tag $RELEASE_REF ($TAG_SHA) is not on master. Blocking production deploy."
            exit 1
          fi

      # ✅ Install .NET 10
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ✅ Restore explicitly
      - name: Restore dependencies
        run: dotnet restore JobFlow.API/JobFlow.API.csproj

      - name: Build
        run: dotnet build JobFlow.API/JobFlow.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish JobFlow.API/JobFlow.API.csproj \
          --configuration Release \
          --runtime linux-x64 \
          --self-contained true \
          /p:PublishSingleFile=true \
          /p:IncludeNativeLibrariesForSelfExtract=true \
          --no-build \
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish
          retention-days: 7

  deploy:
    name: Deploy to Production (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }})
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    permissions:
      contents: read
      actions: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: jobflow-api
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: .

      - name: Resolve production deployed version
        id: prod-version
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Record production deployed version
        uses: actions/github-script@v9
        env:
          DEPLOYED_VERSION: ${{ steps.prod-version.outputs.value }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const name = 'API_PRODUCTION_VERSION';
            const value = process.env.DEPLOYED_VERSION;

            try {
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else if (error.status === 403) {
                core.warning('Skipping API_PRODUCTION_VERSION update: token lacks actions variable permissions (403).');
              } else {
                throw error;
              }
            }

  publish-version-table:
    name: Publish Final Version Table
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - deploy
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          echo "value=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Publish final deployment table
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.value }}
          STAGING_VERSION: ${{ vars.API_STAGING_VERSION }}
          PROD_VERSION: ${{ needs.deploy.result == 'success' && steps.release-tag.outputs.value || vars.API_PRODUCTION_VERSION }}
          PROD_STATUS: ${{ needs.deploy.result }}
        run: |
          [ -n "$STAGING_VERSION" ] || STAGING_VERSION="n/a"
          [ -n "$PROD_VERSION" ] || PROD_VERSION="n/a"

          {
            echo "## Final API Version Table"
            echo
            echo "Release tag: $RELEASE_TAG"
            echo
            echo "| Environment | Deployed version | Job status |"
            echo "| --- | --- | --- |"
            echo "| Staging | $STAGING_VERSION | unchanged in this workflow |"
            echo "| Production | $PROD_VERSION | $PROD_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
