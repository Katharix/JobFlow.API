name: Build and deploy ASP.Net Core app to Azure Web App - jobflow-api

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (format: release-*)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

      - name: Validate release tag ref
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_REF" =~ ^release- ]]; then
            echo "Production deployments require a release-* tag."
            exit 1
          fi

      # ✅ Install .NET 10
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ✅ Restore explicitly
      - name: Restore dependencies
        run: dotnet restore JobFlow.API/JobFlow.API.csproj

      - name: Build
        run: dotnet build JobFlow.API/JobFlow.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish JobFlow.API/JobFlow.API.csproj \
          --configuration Release \
          --runtime linux-x64 \
          --self-contained true \
          /p:PublishSingleFile=true \
          /p:IncludeNativeLibrariesForSelfExtract=true \
          --no-build \
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    permissions:
      contents: read
      actions: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: jobflow-api
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: .
