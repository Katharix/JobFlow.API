name: Build and deploy ASP.Net Core app to Azure Web App - jobflow-api-staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build JobFlow.API/JobFlow.API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish JobFlow.API/JobFlow.API.csproj --configuration Release --runtime linux-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true --output ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  migrate-staging-db:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Staging'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore projects for EF
        run: |
          dotnet restore JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj
          dotnet restore JobFlow.Domain/JobFlow.Domain.csproj

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*

      - name: Apply EF migrations to staging database
        env:
          ConnectionStrings__JobFlowDB: ${{ secrets.STAGING_JOBFLOWDB_CONNECTION_STRING }}
        run: dotnet ef database update --project JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj --startup-project JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj --context JobFlowDbContext

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate-staging-db
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read
      actions: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'jobflow-api'
          slot-name: 'jobflow-api-staging'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: .

  prod-approval:
    name: Manual Approval For Production
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
      issues: write

    steps:
      - name: Validate PROD_APPROVERS variable
        env:
          PROD_APPROVERS: ${{ vars.PROD_APPROVERS }}
        run: |
          if [ -z "$PROD_APPROVERS" ]; then
            echo "Set repository variable PROD_APPROVERS to a comma-separated list of GitHub usernames allowed to approve production deploys."
            exit 1
          fi

      - name: Wait for manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ vars.PROD_APPROVERS }}
          minimum-approvals: 1
          issue-title: "Approve API production deploy"
          issue-body: "Review staging deployment and approve this production deployment by commenting 'approve'."
          exclude-workflow-initiator-as-approver: true

  create-release-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: prod-approval
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="release-$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "API release $tag"
          git push origin "$tag"

      - name: Tag summary
        run: echo "Release tag created and pushed. Production deploy is handled by tag-triggered workflow."
