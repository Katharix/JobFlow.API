name: Build and deploy ASP.Net Core app to Azure Web App - jobflow-api-staging

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build JobFlow.API/JobFlow.API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish JobFlow.API/JobFlow.API.csproj --configuration Release --runtime linux-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true --output ./myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: .net-app
          path: ./myapp
          retention-days: 7

  migrate-staging-db:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Staging'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore projects for EF
        run: |
          dotnet restore JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj
          dotnet restore JobFlow.Domain/JobFlow.Domain.csproj

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.*

      - name: Apply EF migrations to staging database
        env:
          ConnectionStrings__JobFlowDB: ${{ secrets.STAGING_JOBFLOWDB_CONNECTION_STRING }}
        run: dotnet ef database update --project JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj --startup-project JobFlow.Infrastructure.Persistence/JobFlow.Infrastructure.Persistence.csproj --context JobFlowDbContext

  deploy:
    name: Deploy to Staging (${{ github.sha }})
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate-staging-db
    environment:
      name: 'Staging'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3.0.8
        with:
          app-name: 'jobflow-api'
          slot-name: 'jobflow-api-staging'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: .

      - name: Resolve staging source version
        id: staging-version
        run: |
          echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Record staging deployed version
        uses: actions/github-script@v7
        env:
          DEPLOYED_VERSION: ${{ steps.staging-version.outputs.value }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const name = 'API_STAGING_VERSION';
            const value = process.env.DEPLOYED_VERSION;

            try {
              await github.rest.actions.updateRepoVariable({ owner, repo, name, value });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.actions.createRepoVariable({ owner, repo, name, value });
              } else if (error.status === 403) {
                core.warning('Skipping API_STAGING_VERSION update: token lacks actions variable permissions (403).');
              } else {
                throw error;
              }
            }

  create-release-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="release-$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "API release $tag"
          git push origin "$tag"

      - name: Tag summary
        run: echo "Release tag created and pushed. Production deploy is handled by tag-triggered workflow."
