name: Require Work Item

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        run: |
          if [[ ! "${{ github.event.pull_request.title }}" =~ AB#[0-9]+ ]]; then
            echo "PR must include Azure DevOps work item (AB#123)"
            exit 1
          fi
